# values-multi-namespace.yaml
# Example values file for multi-namespace deployment
# Use: helm install marklogic-operator ./charts/marklogic-operator-kubernetes -f values-multi-namespace.yaml

# Operator scope configuration - MULTI-NAMESPACE WATCHING
scope:
  type: namespace
  # Watch multiple specific namespaces
  # The operator will create Role/RoleBinding in each namespace automatically
  watchNamespaces:
    - marklogic-prod
    - marklogic-staging
    - marklogic-dev

# Controller Manager Configuration
controllerManager:
  replicas: 1
  
  manager:
    image:
      repository: progressofficial/marklogic-operator-kubernetes
      tag: 1.1.0
    args:
    - --health-probe-bind-address=:8081
    - --metrics-bind-address=127.0.0.1:8080
    - --leader-elect
    resources:
      limits:
        cpu: 500m
        memory: 128Mi
      requests:
        cpu: 10m
        memory: 64Mi
  
  kubeRbacProxy:
    image:
      repository: gcr.io/kubebuilder/kube-rbac-proxy
      tag: v0.15.0
    resources:
      limits:
        cpu: 500m
        memory: 128Mi
      requests:
        cpu: 5m
        memory: 64Mi

# Service Account
serviceAccount:
  create: true
  annotations: {}
  name: ""

# Metrics Service
metricsService:
  type: ClusterIP
  ports:
  - name: https
    port: 8443
    protocol: TCP
    targetPort: https

# Image Pull Secrets (if needed for private registries)
imagePullSecrets: []
# - name: my-registry-secret

# Kubernetes cluster domain
kubernetesClusterDomain: cluster.local

# Notes:
# - The operator will watch ONLY the specified namespaces
# - Role and RoleBinding will be automatically created in each namespace
# - Make sure the namespaces exist before deploying, or create them:
#   kubectl create namespace marklogic-prod
#   kubectl create namespace marklogic-staging
#   kubectl create namespace marklogic-dev
