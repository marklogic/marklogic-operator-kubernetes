# Configures the controller manager metrics endpoint.
#
# ── Secure mode (default, recommended for production) ──────────────────────────────────────
# The manager serves /metrics over HTTPS on :8443.
# Every scrape is authenticated via TokenReview and authorised via
# SubjectAccessReview.  Prometheus must present a ServiceAccount token that
# is bound to the metrics-reader ClusterRole.
#
# ── Insecure mode (development / quick-start) ──────────────────────────────────
# To serve plain HTTP on :8080 with no authentication, replace the manager
# args block below with:
#
#   - name: manager
#     args:
#     - "--health-probe-bind-address=:8081"
#     - "--metrics-bind-address=:8080"
#     - "--metrics-secure=false"
#     - "--leader-elect"
#     ports:
#     - containerPort: 8080
#       protocol: TCP
#       name: http
#
# ──────────────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: controller-manager
  namespace: system
spec:
  template:
    spec:
      containers:
      - name: manager
        args:
        - "--health-probe-bind-address=:8081"
        - "--metrics-bind-address=:8443"
        - "--metrics-secure=true"
        - "--leader-elect"
        ports:
        - containerPort: 8443
          protocol: TCP
          name: https
