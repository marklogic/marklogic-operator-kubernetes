# This patch configures the controller manager to serve its /metrics endpoint
# with native HTTPS + Kubernetes TokenReview/SubjectAccessReview authentication,
# replacing the former kube-rbac-proxy sidecar.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: controller-manager
  namespace: system
spec:
  template:
    spec:
      containers:
      - name: manager
        args:
        - "--health-probe-bind-address=:8081"
        - "--metrics-bind-address=:8443"
        - "--metrics-secure=true"
        - "--leader-elect"
        ports:
        - containerPort: 8443
          protocol: TCP
          name: https
